name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  rust:
    name: Rust checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Install native link dependencies
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libopenblas-dev
      - run: cargo fmt --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      # Windows test failures are pre-existing and tracked in:
      #   #178 (workspace/PTY/stream-mode tests)
      # They will be fixed by issues #190-#193 (Windows-specific impl work).
      # continue-on-error keeps the leg visible (red = known failures) without
      # blocking main; remove this once #178 is fully resolved.
      - run: cargo test --workspace --locked
        continue-on-error: ${{ matrix.os == 'windows-latest' }}

  secret-guard:
    name: Secret guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'
      - run: python scripts/check-secrets.py

  cargo-deny:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      # Commit-pinned (v2.0.20): a supply-chain gate must not itself depend on a
      # mutable action tag. Config lives in deny.toml at the repo root.
      - uses: EmbarkStudios/cargo-deny-action@bb137d7af7e4fb67e5f82a49c4fce4fad40782fe # v2.0.20
        with:
          command: check advisories bans sources
